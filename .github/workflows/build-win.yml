name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Windows installer + portable
        run: npm run dist

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v1.4.0 -y --cleanup-tag 2>/dev/null || true
          gh release create v1.4.0 dist/*.exe \
            --title "Nebula (Windows) v1.4.0" \
            --notes "Adds a quality picker: while playing a stream with more than one resolution, a gear button (top-right) lets you lock the video to a specific quality (1080p, 720p, 480p, ...) or leave it on Auto. The button only appears when a stream actually has multiple qualities. Artifacts have stable names (Nebula-Portable.exe / Nebula-Setup.exe) so releases/latest/download links always fetch the newest build. Add an add-on, browse it, and play — plays and decrypts every format. Setup is the installer; Portable runs without installing. Unsigned, so Windows SmartScreen may warn (More info -> Run anyway)."
