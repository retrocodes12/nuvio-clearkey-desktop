name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Windows installer + portable
        run: npm run dist

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v1.1.0 -y --cleanup-tag 2>/dev/null || true
          gh release create v1.1.0 dist/*.exe \
            --title "ClearKey Player (Windows) v1.1.0" \
            --notes "Windows desktop build (Electron). Add a Stremio add-on, browse it, and play HLS / DASH / DASH+ClearKey via Shaka Player + EME. ClearKeyPlayer-Setup-*.exe is the installer; ClearKeyPlayer-Portable-*.exe runs without installing. Unsigned, so Windows SmartScreen may warn (More info -> Run anyway)."
